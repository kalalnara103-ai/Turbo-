name: name: Build VST DLL

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile DLL
      run: |
        powershell -Command "(gc ReverbEffect.cpp) -replace '#include <malloc.h>', '#include <stdlib.h>' | Out-File -encoding ASCII ReverbEffect.cpp"
        cl.exe /LD /EHsc /I. *.cpp /Fe:EAXReverb.dll /link /INCREMENTAL:NO

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: EAX-Reverb-Plugin
        path: EAXReverb.dll
        

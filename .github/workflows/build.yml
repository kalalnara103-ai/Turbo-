name: Build VST DLL

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Compile DLL
      run: |
        # استبدال المalloc بـ stdlib لتفادي خطأ mm_malloc
        powershell -Command "(gc ReverbEffect.cpp) -replace '#include <malloc.h>', '#include <stdlib.h>' | Out-File -encoding ASCII ReverbEffect.cpp"
        # أمر البناء مع تجاهل التحذيرات (Permissive)
        cl.exe /LD /EHsc /I. *.cpp /Fe:EAXReverb.dll /link /INCREMENTAL:NO
      continue-on-error: true

    - name: Upload DLL
      uses: actions/upload-artifact@v3
      with:
        name: EAX-Reverb-Plugin
        path: EAXReverb.dll
